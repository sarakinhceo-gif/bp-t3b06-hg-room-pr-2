    <style>
        /* ============= BRUTALIST-AVANTGARDE SYSTEM v2.4 ============= */
        /* KR-NEON-VOID THEME */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0b0;
            --accent: #00ffcc;
            --accent-dim: #00cc99;
            --border: #333333;
            --border-accent: #00ffcc;
            --shadow-accent: rgba(0,255,204,0.15);
            --font-mono: 'Courier New', monospace;
            --font-sans: 'IBM Plex Sans KR', 'Noto Sans KR', sans-serif;
            --grid: 12;
            --base-space: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-dim); }
        img { max-width: 100%; height: auto; display: block; }

        /* LAYOUT */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 calc(var(--base-space)*3); }

        /* HEADER */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: calc(var(--base-space)*2) 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: var(--font-mono);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }
        .logo span { color: var(--text-primary); }

        /* HAMBURGER MENU */
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            z-index: 101;
        }
        .nav-toggle span {
            display: block;
            width: 28px;
            height: 2px;
            background: var(--text-primary);
            margin: 6px 0;
            transition: 0.3s;
        }
        .nav {
            display: flex;
            gap: calc(var(--base-space)*3);
            align-items: center;
        }
        .nav a {
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .nav a:hover { border-bottom-color: var(--accent); }
        .nav a.active { border-bottom-color: var(--accent); color: var(--accent); }

        /* HERO (블로그 전용) */
        .blog-hero {
            padding: calc(var(--base-space)*12) 0 calc(var(--base-space)*6);
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }
        .blog-hero h1 {
            font-family: var(--font-mono);
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--accent);
            margin-bottom: calc(var(--base-space)*2);
            text-transform: uppercase;
        }
        .blog-hero p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.8;
        }
        .blog-hero .meta {
            margin-top: calc(var(--base-space)*4);
            font-size: 0.85rem;
            color: #666;
            display: flex;
            justify-content: center;
            gap: calc(var(--base-space)*3);
        }
        .blog-hero .meta span { display: inline-flex; align-items: center; gap: 4px; }

        /* ARTICLE CONTENT */
        .article-content {
            padding: calc(var(--base-space)*8) 0;
            max-width: 800px;
            margin: 0 auto;
        }
        .article-content h2 {
            font-family: var(--font-mono);
            font-size: 1.8rem;
            font-weight: 600;
            margin-top: calc(var(--base-space)*6);
            margin-bottom: calc(var(--base-space)*3);
            color: var(--accent);
            letter-spacing: -0.5px;
            border-left: 4px solid var(--accent);
            padding-left: calc(var(--base-space)*2);
        }
        .article-content h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: calc(var(--base-space)*4);
            margin-bottom: calc(var(--base-space)*2);
            color: var(--text-primary);
        }
        .article-content p {
            margin-bottom: calc(var(--base-space)*3);
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.8;
        }
        .article-content ul, .article-content ol {
            margin-bottom: calc(var(--base-space)*3);
            padding-left: calc(var(--base-space)*4);
            color: var(--text-secondary);
        }
        .article-content li { margin-bottom: calc(var(--base-space)*1.5); }
        .article-content .highlight-box {
            background: var(--bg-card);
            border: 1px solid var(--border-accent);
            padding: calc(var(--base-space)*4);
            border-radius: 4px;
            margin: calc(var(--base-space)*4) 0;
        }
        .article-content .highlight-box p { margin-bottom: 0; color: var(--text-primary); }
        .article-content .highlight-box strong { color: var(--accent); }

        /* TABLE (데이터 표현) */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: calc(var(--base-space)*4) 0;
            font-size: 0.95rem;
        }
        .data-table th {
            background: var(--bg-card);
            color: var(--accent);
            font-family: var(--font-mono);
            text-transform: uppercase;
            padding: 12px 16px;
            border: 1px solid var(--border);
            text-align: left;
            font-weight: 600;
        }
        .data-table td {
            padding: 12px 16px;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .data-table tr:nth-child(even) td { background: var(--bg-secondary); }
        .data-table td:first-child { font-weight: 500; color: var(--text-primary); }

        /* CTA (블로그 내) */
        .blog-cta {
            background: var(--bg-card);
            border: 1px solid var(--border-accent);
            padding: calc(var(--base-space)*6);
            margin: calc(var(--base-space)*6) 0;
            text-align: center;
            border-radius: 4px;
        }
        .blog-cta h3 {
            font-family: var(--font-mono);
            font-size: 1.4rem;
            color: var(--accent);
            margin-bottom: calc(var(--base-space)*2);
        }
        .blog-cta p { color: var(--text-secondary); margin-bottom: calc(var(--base-space)*3); }
        .blog-cta .btn {
            display: inline-block;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 12px 36px;
            font-family: var(--font-mono);
            font-size: 1rem;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .blog-cta .btn:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        /* FOOTER */
        .footer {
            border-top: 1px solid var(--border);
            padding: calc(var(--base-space)*6) 0;
            margin-top: calc(var(--base-space)*8);
        }
        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: calc(var(--base-space)*2);
        }
        .footer p {
            font-size: 0.85rem;
            color: #555;
        }
        .footer a {
            font-size: 0.85rem;
            color: #555;
            margin-left: calc(var(--base-space)*3);
        }
        .footer a:hover { color: var(--accent); }

        /* 반응형 */
        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            .nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--bg-secondary);
                border-bottom: 1px solid var(--border);
                padding: calc(var(--base-space)*3);
                gap: calc(var(--base-space)*2);
            }
            .nav.open { display: flex; }
            .header-inner { position: relative; }
            .blog-hero h1 { font-size: 2rem; }
            .blog-hero p { font-size: 0.95rem; }
            .article-content h2 { font-size: 1.4rem; }
            .data-table { font-size: 0.8rem; }
            .data-table th, .data-table td { padding: 8px 10px; }
            .footer-inner { flex-direction: column; text-align: center; }
            .footer a { margin: 0 8px; }
        }
    </style>
